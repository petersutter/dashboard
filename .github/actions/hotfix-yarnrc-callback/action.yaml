name: Hotfix Yarnrc Callback
description: |
  Updates .yarnrc.yml with hotfix branch references during version bump.
  Prerequisite: This action expects the $HOTFIX_BRANCH environment variable to be set in the calling workflow context.

inputs:
  effective-version:
    description: The effective version after bump (passed automatically by the version action; not used here but accepted for compatibility)
    required: false

runs:
  using: composite
  steps:
    - name: Update .yarnrc.yml
      shell: bash
      run: |
        cat <<EOF >> .yarnrc.yml
        changesetBaseRefs:
          - "master"
          - "origin/master"
          - "$HOTFIX_BRANCH"
          - "origin/$HOTFIX_BRANCH"
        EOF
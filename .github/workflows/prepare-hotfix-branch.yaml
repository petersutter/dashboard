name: Prepare Hotfix Branch

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag for which the hotfix should be created'
        required: true
        type: string

jobs:
  prepare-hotfix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.tag }}
      - name: Setup Git Identity
        uses: gardener/cc-utils/.github/actions/setup-git-identity@master
      - name: Compute branch names
        run: |
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ \.0$ ]]; then
            echo "Tag does not end with .0"
            exit 1
          fi
          BASE_VERSION="${TAG%.*}"
          echo "HOTFIX_BRANCH=hotfix-${BASE_VERSION}" >> $GITHUB_ENV
          echo "PREPARE_BRANCH=hotfix-prepare-${BASE_VERSION}" >> $GITHUB_ENV
      - name: Sanity check hotfix branch name
        run: |
          if [[ ! "$HOTFIX_BRANCH" =~ ^hotfix-[a-zA-Z0-9.-]+$ ]]; then
            echo "Invalid hotfix branch name derived from tag: $HOTFIX_BRANCH"
            exit 1
          fi
      - name: Check if hotfix branch exists
        run: |
          git fetch origin
          if git ls-remote --exit-code origin "$HOTFIX_BRANCH" > /dev/null 2>&1; then
            echo "Hotfix branch $HOTFIX_BRANCH already exists"
            exit 1
          fi
      - name: Create and push hotfix branch
        run: |
          git checkout -b "$HOTFIX_BRANCH"
          git push origin "$HOTFIX_BRANCH"
      - name: Check if prepare branch exists
        run: |
          if git ls-remote --exit-code origin "$PREPARE_BRANCH" > /dev/null 2>&1; then
            echo "Prepare branch $PREPARE_BRANCH already exists"
            exit 1
          fi
      - name: Create prepare branch
        run: git checkout -b "$PREPARE_BRANCH"
      - name: Bump patch version
        uses: gardener/cc-utils/.github/actions/version@master
        with:
          version-operation: bump-patch
          prerelease: dev
          callback-action-path: .github/actions/hotfix-yarnrc-callback
          repository-operation: commit-to-head
          commit-message: Bump patch version to ${version} for hotfix and update .yarnrc.yml
      - name: Push prepare branch
        run: git push origin "$PREPARE_BRANCH"
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base "$HOTFIX_BRANCH" \
            --head "$PREPARE_BRANCH" \
            --title "[$HOTFIX_BRANCH] Prepare hotfix branch" \
            --body "Bumps the patch version and adds the hotfix branch references to .yarnrc.yml for release preparation."
